app            = "%fly_app_name%"
primary_region = "%fly_app_region%"
kill_signal    = "SIGINT"
kill_timeout   = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  PHP_MEMORY_LIMIT = "512M"

  # ---------------------------------------------------------------
  # Security hardening
  # ---------------------------------------------------------------
  NEXTCLOUD_TRUSTED_DOMAINS  = "%fly_app_name%.fly.dev"
  OVERWRITEPROTOCOL          = "https"
  OVERWRITEHOST              = "%fly_app_name%.fly.dev"
  OVERWRITE_CLI_URL          = "https://%fly_app_name%.fly.dev"

  # Send logs to fly.io log stream instead of disk
  # This prevents logs from filling the volume
  NEXTCLOUD_LOGGING_BACKEND  = "errorlog"

  # Maintenance window at 2am UTC (matches maintenance.yml schedule)
  MAINTENANCE_WINDOW_START   = "2"

  # Default phone region
  NC_DEFAULT_PHONE_REGION    = "US"

  # ---------------------------------------------------------------
  # Redis — Upstash managed via fly redis create
  # REDIS_HOST must be hostname ONLY — no port, no protocol
  # REDIS_TIMEOUT = 0.0 enables persistent connections (prevents
  # "Redis server went away" errors with Upstash)
  # ---------------------------------------------------------------
  REDIS_HOST          = "%redis_host%"
  REDIS_HOST_PORT     = "%redis_port%"
  REDIS_HOST_PASSWORD = "%redis_password%"
  REDIS_TIMEOUT       = "0.0"
  REDIS_DB_INDEX      = "0"

  # ---------------------------------------------------------------
  # Postgres
  # DATABASE_URL is set automatically by fly pg attach as a secret.
  # POSTGRES_PASSWORD is extracted from DATABASE_URL in deploy.yml
  # NOT from FLY_DB_PASSWORD (which is only used for pg create)
  # ---------------------------------------------------------------
  POSTGRES_DB       = "nextcloud"
  POSTGRES_USER     = "nextcloud"
  POSTGRES_HOST     = "%fly_app_name%-db.internal"
  POSTGRES_PASSWORD = "%postgres_password%"

  # ---------------------------------------------------------------
  # Cloudflare R2 object storage
  # OBJECTSTORE_S3_HOST must be hostname only — no https:// prefix
  # OBJECTSTORE_S3_USEPATH_STYLE must be true for R2
  # OBJECTSTORE_S3_REGION must be "auto" for R2
  # ---------------------------------------------------------------
  OBJECTSTORE_S3_SSL            = "true"
  OBJECTSTORE_S3_USEPATH_STYLE  = "true"
  OBJECTSTORE_S3_LEGACYAUTH     = "false"
  OBJECTSTORE_S3_AUTOCREATE     = "true"
  OBJECTSTORE_S3_REGION         = "auto"
  OBJECTSTORE_S3_BUCKET         = "%s3_bucket_name%"
  OBJECTSTORE_S3_KEY            = "%s3_access_key%"
  OBJECTSTORE_S3_SECRET         = "%s3_secret_key%"
  OBJECTSTORE_S3_HOST           = "%s3_endpoint%"

# ---------------------------------------------------------------
# Mount only the data directory — NOT the full app
# This keeps the volume small (user data only)
# App files live in the container and refresh on every deploy
# ---------------------------------------------------------------
[[mounts]]
  source      = "nextcloud_data"
  destination = "/var/www/html/data"

[http_service]
  internal_port        = 80
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  # Security headers
  [[http_service.checks]]
    grace_period  = "10s"
    interval      = "30s"
    method        = "GET"
    path          = "/status.php"
    protocol      = "http"
    timeout       = "5s"

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 2500
    soft_limit = 2000

[[vm]]
  memory   = "2gb"
  cpu_kind = "shared"
  cpus     = 2
