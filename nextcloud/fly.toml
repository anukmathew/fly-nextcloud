app            = "%fly_app_name%"
primary_region = "%fly_app_region%"
kill_signal    = "SIGINT"
kill_timeout   = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  PHP_MEMORY_LIMIT = "512M"

  # ---------------------------------------------------------------
  # Redis — Upstash managed via fly redis create
  #
  # REDIS_HOST must be hostname ONLY — no port, no protocol
  # The port is set separately via REDIS_HOST_PORT
  # The password must be the raw password — no "default:" prefix
  #
  # Upstash private URL format: redis://PASSWORD@fly-NAME.upstash.io
  # This only resolves inside fly.io's private network (correct)
  # ---------------------------------------------------------------
  REDIS_HOST          = "%redis_host%"
  REDIS_HOST_PORT     = "%redis_port%"
  REDIS_HOST_PASSWORD = "%redis_password%"
  REDIS_TIMEOUT       = "0.0"
  REDIS_DB_INDEX      = "0"

  # ---------------------------------------------------------------
  # Postgres
  # DATABASE_URL is set automatically by fly pg attach as a secret.
  # Nextcloud Docker image also reads individual POSTGRES_* vars
  # for the initial setup wizard on first boot.
  # POSTGRES_PASSWORD must match what fly pg attach actually set —
  # this is extracted from DATABASE_URL in deploy.yml, NOT from
  # the FLY_DB_PASSWORD secret (which was only for pg create).
  # ---------------------------------------------------------------
  POSTGRES_DB       = "nextcloud"
  POSTGRES_USER     = "nextcloud"
  POSTGRES_HOST     = "%fly_app_name%-db.internal"
  POSTGRES_PASSWORD = "%postgres_password%"

  # ---------------------------------------------------------------
  # Cloudflare R2 object storage
  # OBJECTSTORE_S3_HOST must be hostname only — no https:// prefix
  # OBJECTSTORE_S3_USEPATH_STYLE must be true for R2
  # OBJECTSTORE_S3_REGION must be "auto" for R2
  # ---------------------------------------------------------------
  OBJECTSTORE_S3_SSL            = "true"
  OBJECTSTORE_S3_USEPATH_STYLE  = "true"
  OBJECTSTORE_S3_LEGACYAUTH     = "false"
  OBJECTSTORE_S3_AUTOCREATE     = "true"
  OBJECTSTORE_S3_REGION         = "auto"
  OBJECTSTORE_S3_BUCKET         = "%s3_bucket_name%"
  OBJECTSTORE_S3_KEY            = "%s3_access_key%"
  OBJECTSTORE_S3_SECRET         = "%s3_secret_key%"
  OBJECTSTORE_S3_HOST           = "%s3_endpoint%"

[[mounts]]
  source      = "nextcloud_data"
  destination = "/var/www/html"

[http_service]
  internal_port        = 80
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 2500
    soft_limit = 2000

[[vm]]
  memory   = "1gb"
  cpu_kind = "shared"
  cpus     = 1
