app            = "%fly_app_name%"
primary_region = "%fly_app_region%"
kill_signal    = "SIGINT"
kill_timeout   = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  PHP_MEMORY_LIMIT = "512M"

  # Redis — Upstash managed
  REDIS_HOST          = "%redis_host%"
  REDIS_HOST_PORT     = "%redis_port%"
  REDIS_HOST_PASSWORD = "%redis_password%"
  REDIS_TIMEOUT       = "0.0"
  REDIS_DB_INDEX      = "0"

  # Postgres — DATABASE_URL set automatically by fly pg attach
  # Nextcloud Docker image also reads these individual vars on first boot
  POSTGRES_DB       = "nextcloud"
  POSTGRES_USER     = "nextcloud"
  POSTGRES_HOST     = "%fly_app_name%-db.internal"
  POSTGRES_PASSWORD = "%fly_db_password%"

  # Cloudflare R2 object storage
  OBJECTSTORE_S3_SSL            = "true"
  OBJECTSTORE_S3_USEPATH_STYLE  = "true"
  OBJECTSTORE_S3_LEGACYAUTH     = "false"
  OBJECTSTORE_S3_AUTOCREATE     = "true"
  OBJECTSTORE_S3_BUCKET         = "%s3_bucket_name%"
  OBJECTSTORE_S3_KEY            = "%s3_access_key%"
  OBJECTSTORE_S3_SECRET         = "%s3_secret_key%"
  OBJECTSTORE_S3_HOST           = "%s3_endpoint%"
  OBJECTSTORE_S3_REGION        = "auto"

[[mounts]]
  source      = "nextcloud_data"
  destination = "/var/www/html"

[http_service]
  internal_port        = 80
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 2500
    soft_limit = 2000

[[vm]]
  memory   = "1gb"
  cpu_kind = "shared"
  cpus     = 1
