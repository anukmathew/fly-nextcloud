name: Maintain Fly-Nextcloud
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  maintain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly
        uses: superfly/flyctl-actions/setup-flyctl@1.5

      # ----------------------------------------------------------------
      # POSTGRES BACKUP
      # Dumps the nextcloud DB and uploads to R2.
      # Keeps last 30 days of backups automatically.
      # ----------------------------------------------------------------
      - name: Backup Postgres to R2
        run: |
          DATE=$(date +%Y-%m-%d)
          BACKUP_FILE="backup-$DATE.sql"

          echo "📦 Installing PostgreSQL client..."
          sudo apt-get install -y postgresql-client

          echo "🔌 Starting Postgres proxy..."
          flyctl proxy 5432:5432 \
            --app "${{ secrets.FLY_APP_NAME }}-db" &
          PROXY_PID=$!

          # Wait for proxy to be ready
          sleep 5

          echo "📦 Dumping Postgres database..."
          PGPASSWORD="${{ secrets.FLY_DB_PASSWORD }}" pg_dump \
            -h localhost \
            -p 5432 \
            -U postgres \
            -d nextcloud > "$BACKUP_FILE"

          # Kill proxy
          kill $PROXY_PID

          echo "⬆️  Uploading to R2..."
          aws s3 cp "$BACKUP_FILE" \
            "s3://${{ secrets.S3_BUCKET_NAME }}/postgres-backups/$BACKUP_FILE" \
            --endpoint-url "https://${{ secrets.S3_ENDPOINT }}"

          echo "✅ Backup uploaded: postgres-backups/$BACKUP_FILE"

          # Delete backups older than 30 days
          aws s3 ls "s3://${{ secrets.S3_BUCKET_NAME }}/postgres-backups/" | \
          while read -r line; do
            BACKUP_DATE=$(echo "$line" | awk '{print $1}')
            BACKUP_NAME=$(echo "$line" | awk '{print $4}')
            if [ -n "$BACKUP_NAME" ] && \
               [[ $(date -d "$BACKUP_DATE" +%s 2>/dev/null) -lt $(date -d "30 days ago" +%s) ]]; then
              aws s3 rm "s3://${{ secrets.S3_BUCKET_NAME }}/postgres-backups/$BACKUP_NAME" \
                --endpoint-url "https://${{ secrets.S3_ENDPOINT }}"
              echo "🗑️  Deleted: $BACKUP_NAME"
            fi
          done
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto

      # ----------------------------------------------------------------
      # POSTGRES VOLUME AUTO-RESIZE
      # Extends volume if DB is using >90% of allocated space.
      # Uses flyctl volumes extend (modern single command, no scale dance)
      # ----------------------------------------------------------------
      - name: Check & Resize Postgres Volume
        run: |
          VOL_ID=$(flyctl volumes list \
            --app "${{ secrets.FLY_APP_NAME }}-db" \
            --json | jq -r '.[0].id')

          VOL_SIZE_GB=$(flyctl volumes list \
            --app "${{ secrets.FLY_APP_NAME }}-db" \
            --json | jq -r '.[0].size_gb')

          DB_SIZE_BYTES=$(curl -sf \
            "https://api.fly.io/prometheus/${{ secrets.FLY_ORG }}/api/v1/query" \
            --data-urlencode "query=pg_database_size_bytes{app=\"${{ secrets.FLY_APP_NAME }}-db\"}" \
            --data-urlencode "time=$(date +%s)" \
            -H "Authorization: Bearer ${{ secrets.FLY_API_TOKEN }}" \
            | jq -r '.data.result[] | select(.metric.datname == "nextcloud") | .value[1]' 2>/dev/null || echo "0")

          if [ "$DB_SIZE_BYTES" = "0" ] || [ -z "$DB_SIZE_BYTES" ]; then
            echo "⚠️  Could not fetch DB size from Prometheus, skipping resize check."
            exit 0
          fi

          DB_SIZE_GB=$(awk "BEGIN { printf \"%.2f\", $DB_SIZE_BYTES/1073741824 }")

          echo "📊 Volume size: ${VOL_SIZE_GB}GB"
          echo "📊 Database size: ${DB_SIZE_GB}GB"

          NEEDS_RESIZE=$(awk \
            -v db="$DB_SIZE_GB" \
            -v vol="$VOL_SIZE_GB" \
            'BEGIN { print (db/vol >= 0.9) ? "yes" : "no" }')

          if [ "$NEEDS_RESIZE" = "yes" ]; then
            NEW_SIZE=$((VOL_SIZE_GB + 1))
            echo "⚠️  DB at >90% — extending volume to ${NEW_SIZE}GB..."
            flyctl volumes extend "$VOL_ID" --size "$NEW_SIZE"
            echo "✅ Volume extended to ${NEW_SIZE}GB"
          else
            echo "✅ Volume has sufficient space."
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # ----------------------------------------------------------------
      # R2 CLEANUP
      # Removes incomplete/aborted multipart uploads from R2.
      # These accumulate over time and waste storage quota.
      # ----------------------------------------------------------------
      - name: Cleanup Aborted Uploads from R2
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash

          rclone cleanup \
            --s3-provider Cloudflare \
            --s3-endpoint "https://${{ secrets.S3_ENDPOINT }}" \
            --s3-access-key-id "${{ secrets.S3_ACCESS_KEY }}" \
            --s3-secret-access-key "${{ secrets.S3_SECRET_KEY }}" \
            :s3:${{ secrets.S3_BUCKET_NAME }}

          echo "✅ Cleaned up aborted multipart uploads from R2""
