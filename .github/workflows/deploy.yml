name: (Re)Deploy Fly-Nextcloud
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 9 * * 0'  # every Sunday at 9am — checks for updated containers

jobs:
  update-deploy-nextcloud:
    runs-on: ubuntu-latest

    env:
      fly_org: ${{ secrets.FLY_ORG }}
      fly_app_name: ${{ secrets.FLY_APP_NAME }}
      fly_app_region: ${{ secrets.FLY_APP_REGION }}
      fly_db_password: ${{ secrets.FLY_DB_PASSWORD }}
      s3_bucket_name: ${{ secrets.S3_BUCKET_NAME }}
      s3_endpoint: ${{ secrets.S3_ENDPOINT }}
      s3_access_key: ${{ secrets.S3_ACCESS_KEY }}
      s3_secret_key: ${{ secrets.S3_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly
        uses: superfly/flyctl-actions/setup-flyctl@1.5

      # ----------------------------------------------------------------
      # POSTGRES
      # Unmanaged fly pg — cheap (~$1.94/mo), fine for small teams.
      # Backups are handled separately in maintenance.yml.
      # ----------------------------------------------------------------
      - name: Deploy & Check Postgres
        run: |
          if flyctl pg list | grep -q "${{ env.fly_app_name }}-db"; then
            echo "Postgres already exists, skipping."
          else
            flyctl pg create \
              --name "${{ env.fly_app_name }}-db" \
              -o "${{ env.fly_org }}" \
              --region "${{ env.fly_app_region }}" \
              --vm-size "shared-cpu-1x" \
              --volume-size 1 \
              --initial-cluster-size 1 \
              --password "${{ env.fly_db_password }}"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # ----------------------------------------------------------------
      # REDIS (Upstash managed)
      # No VM, no Dockerfile, no builder — one command.
      # --disable-eviction: safer for Nextcloud file locking & sessions.
      # ~$0.10–$2.00/mo for a small team on pay-as-you-go.
      # ----------------------------------------------------------------
      - name: Deploy & Check Redis
        run: |
          if flyctl redis list -o "${{ env.fly_org }}" | grep -q "${{ env.fly_app_name }}-redis"; then
            echo "Redis already exists, fetching connection details."
          else
            echo "N" | flyctl redis create \
              --name "${{ env.fly_app_name }}-redis" \
              -o "${{ env.fly_org }}" \
              --region "${{ env.fly_app_region }}" \
              --no-replicas \
              --disable-eviction
          fi

          # Parse private Redis URL — Upstash format: redis://PASSWORD@HOST
          REDIS_URL=$(flyctl redis status "${{ env.fly_app_name }}-redis" --json | jq -r '.PrivateURL')
          REDIS_HOST=$(echo $REDIS_URL | sed -E 's|redis://.*@(.*)|\1|')
          REDIS_PORT="6379"
          REDIS_PASSWORD=$(echo $REDIS_URL | sed -E 's|redis://(.*)@.*|\1|')

          echo "REDIS_HOST=$REDIS_HOST"         >> $GITHUB_ENV
          echo "REDIS_PORT=$REDIS_PORT"         >> $GITHUB_ENV
          echo "REDIS_PASSWORD=$REDIS_PASSWORD" >> $GITHUB_ENV
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # ----------------------------------------------------------------
      # NEXTCLOUD APP
      # Creates app + volume on first run, deploys on every run.
      # Postgres is attached via fly pg attach which sets DATABASE_URL
      # automatically — no credentials needed in fly.toml.
      # ----------------------------------------------------------------
      - name: Deploy Nextcloud App
        run: |
          if ! flyctl apps list | grep -q "^${{ env.fly_app_name }} "; then
            flyctl launch \
              --name "${{ env.fly_app_name }}" \
              --no-deploy \
              -o "${{ env.fly_org }}" \
              --region "${{ env.fly_app_region }}" \
              --yes

            flyctl scale memory 1024 \
              --app "${{ env.fly_app_name }}"

            flyctl volumes create nextcloud_data \
              --size 1 \
              --region "${{ env.fly_app_region }}" \
              --app "${{ env.fly_app_name }}" \
              --yes

            rm -f fly.toml
          fi

          # Attach Postgres on first deploy — sets DATABASE_URL secret automatically
          if ! flyctl secrets list --app "${{ env.fly_app_name }}" | grep -q "DATABASE_URL"; then
            flyctl pg attach "${{ env.fly_app_name }}-db" \
              --app "${{ env.fly_app_name }}" \
              --database-name nextcloud \
              --database-user nextcloud
          fi

          # Substitute all placeholders in fly.toml
          cd nextcloud
          sed -i "s|%fly_app_name%|${{ env.fly_app_name }}|g"     fly.toml
          sed -i "s|%fly_app_region%|${{ env.fly_app_region }}|g"  fly.toml
          sed -i "s|%redis_host%|${{ env.REDIS_HOST }}|g"          fly.toml
          sed -i "s|%redis_port%|${{ env.REDIS_PORT }}|g"          fly.toml
          sed -i "s|%redis_password%|${{ env.REDIS_PASSWORD }}|g"  fly.toml
          sed -i "s|%s3_bucket_name%|${{ env.s3_bucket_name }}|g"  fly.toml
          sed -i "s|%s3_access_key%|${{ env.s3_access_key }}|g"    fly.toml
          sed -i "s|%s3_secret_key%|${{ env.s3_secret_key }}|g"    fly.toml
          sed -i "s|%s3_endpoint%|${{ env.s3_endpoint }}|g"        fly.toml

          flyctl deploy \
            --app "${{ env.fly_app_name }}" \
            --yes
          cd ..
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
