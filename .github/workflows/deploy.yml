name: (Re)Deploy Fly-Nextcloud
on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 9 * * 0'

jobs:
  update-deploy-nextcloud:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly
        uses: superfly/flyctl-actions/setup-flyctl@1.5

      # ----------------------------------------------------------------
      # POSTGRES
      # ----------------------------------------------------------------
      - name: Deploy & Check Postgres
        run: |
          if flyctl apps list | grep -q "${{ secrets.FLY_APP_NAME }}-db"; then
            echo "Postgres already exists, skipping."
          else
            flyctl pg create \
              --name "${{ secrets.FLY_APP_NAME }}-db" \
              -o "${{ secrets.FLY_ORG }}" \
              --region "${{ secrets.FLY_APP_REGION }}" \
              --vm-size "shared-cpu-1x" \
              --volume-size 1 \
              --initial-cluster-size 1 \
              --password "${{ secrets.FLY_DB_PASSWORD }}"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # ----------------------------------------------------------------
      # REDIS — fetch connection details from existing Upstash instance
      # ----------------------------------------------------------------
      - name: Get Redis Connection Details
        run: |
          REDIS_URL=$(flyctl redis status "${{ secrets.FLY_APP_NAME }}-redis" | grep "Private URL" | awk '{print $4}')

          # URL format: redis://default:PASSWORD@HOST
          REDIS_HOST=$(echo $REDIS_URL | sed -E 's|redis://.*@(.*)|\1|')
          REDIS_PORT="6379"
          REDIS_PASSWORD=$(echo $REDIS_URL | sed -E 's|redis://default:(.*)@.*|\1|')

          echo "REDIS_HOST=$REDIS_HOST"         >> $GITHUB_ENV
          echo "REDIS_PORT=$REDIS_PORT"         >> $GITHUB_ENV
          echo "REDIS_PASSWORD=$REDIS_PASSWORD" >> $GITHUB_ENV
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # ----------------------------------------------------------------
      # NEXTCLOUD APP
      # ----------------------------------------------------------------
      - name: Deploy Nextcloud App
        run: |
          # Create app only if it doesn't exist
          if ! flyctl apps list | grep -q "^${{ secrets.FLY_APP_NAME }} "; then
            flyctl apps create "${{ secrets.FLY_APP_NAME }}" \
              -o "${{ secrets.FLY_ORG }}"
          fi

          # Create volume only if it doesn't exist
          if ! flyctl volumes list --app "${{ secrets.FLY_APP_NAME }}" | grep -q "nextcloud_data"; then
            flyctl volumes create nextcloud_data \
              --size 1 \
              --region "${{ secrets.FLY_APP_REGION }}" \
              --app "${{ secrets.FLY_APP_NAME }}" \
              --yes
          fi

          # Attach Postgres only if DATABASE_URL not already set
          if ! flyctl secrets list --app "${{ secrets.FLY_APP_NAME }}" | grep -q "DATABASE_URL"; then
            flyctl pg attach "${{ secrets.FLY_APP_NAME }}-db" \
              --app "${{ secrets.FLY_APP_NAME }}" \
              --database-name nextcloud \
              --database-user nextcloud \
              --yes
          fi

          cd nextcloud

          # Restore our fly.toml template from git
          git checkout fly.toml

          # Substitute all placeholders
          sed -i "s|%fly_app_name%|${{ secrets.FLY_APP_NAME }}|g"      fly.toml
          sed -i "s|%fly_app_region%|${{ secrets.FLY_APP_REGION }}|g"  fly.toml
          sed -i "s|%redis_host%|${{ env.REDIS_HOST }}|g"               fly.toml
          sed -i "s|%redis_port%|${{ env.REDIS_PORT }}|g"               fly.toml
          sed -i "s|%redis_password%|${{ env.REDIS_PASSWORD }}|g"       fly.toml
          sed -i "s|%fly_db_password%|${{ secrets.FLY_DB_PASSWORD }}|g" fly.toml
          sed -i "s|%s3_bucket_name%|${{ secrets.S3_BUCKET_NAME }}|g"  fly.toml
          sed -i "s|%s3_access_key%|${{ secrets.S3_ACCESS_KEY }}|g"    fly.toml
          sed -i "s|%s3_secret_key%|${{ secrets.S3_SECRET_KEY }}|g"    fly.toml
          sed -i "s|%s3_endpoint%|${{ secrets.S3_ENDPOINT }}|g"        fly.toml

          flyctl deploy \
            --config fly.toml \
            --app "${{ secrets.FLY_APP_NAME }}" \
            --ha=false \
            --remote-only \
            --yes
          cd ..
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
